<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | Edvardsen Byggtjenester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans">
    <main class="max-w-4xl mx-auto py-20 px-4">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-black uppercase italic italic text-slate-900">Kontakt Meg</h1>
            <div class="w-20 h-2 bg-orange-600 mx-auto mt-4"></div>
            <p class="mt-6 text-lg font-medium text-slate-600 italic">Be om befaring eller et uforpliktende tilbud.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-12">
            <div class="bg-slate-900 text-white p-8 rounded-lg shadow-xl">
                <h3 class="text-xl font-black uppercase mb-6 text-orange-500 italic">Direkte kontakt</h3>
                <div class="space-y-6">
                    <p class="flex items-center gap-4 text-lg font-bold"><i class="fas fa-phone text-orange-500"></i> 900 56 314</p>
                    <p class="flex items-center gap-4 text-lg font-bold"><i class="fas fa-envelope text-orange-500"></i> kim.ebt@outlook.com</p>
                    <p class="flex items-center gap-4"><i class="fas fa-map-marker-alt text-orange-500"></i> Karen Bachs vei 23, 1542 Vestby</p>
                </div>
                <div class="mt-10 p-4 border-2 border-orange-600 text-center font-black italic">
                    SVARER RASKT PÅ TELEFON!
                </div>
            </div>

            <form class="space-y-4">
                <div>
                    <label class="block text-sm font-black uppercase mb-1">Navn</label>
                    <input type="text" class="w-full p-3 bg-white border-2 border-slate-200 focus:border-orange-600 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-black uppercase mb-1">E-post / Telefon</label>
                    <input type="text" class="w-full p-3 bg-white border-2 border-slate-200 focus:border-orange-600 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-black uppercase mb-1">Hva trenger du hjelp med?</label>
                    <textarea rows="4" class="w-full p-3 bg-white border-2 border-slate-200 focus:border-orange-600 outline-none transition"></textarea>
                </div>
                <button type="submit" class="w-full bg-orange-600 text-white font-black py-4 uppercase italic hover:bg-orange-700 transition shadow-lg">Send melding</button>
            </form>
        </div>
    </main>
</body>
</html>
